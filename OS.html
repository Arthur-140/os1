<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Screen</title>
  <style>
    body {
      
    margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #4b6cb7, #182848);
      font-family: Arial, sans-serif;
      color: #ffffff;
    }

    .welcome-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
      padding: 40px 48px;
      max-width: 520px;
      text-align: center;
      backdrop-filter: blur(18px);
    }

    .welcome-card h1 {
      margin: 0 0 16px;
      font-size: 2.75rem;
      letter-spacing: -0.04em;
    }

    .welcome-card p {
      margin: 0 0 28px;
      font-size: 1.05rem;
      line-height: 1.75;
      color: rgba(255, 255, 255, 0.85);
    }

    .welcome-card button {
      background: linear-gradient(135deg, #8bd8ff, #4b6cb7);
      border: none;
      color: #101923;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .welcome-card button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(75, 108, 183, 0.35);
    }

    .footer {
      margin-top: 24px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.68);
    }
  </style>
</head>
<body>
  <main class="welcome-card">
    <h1>Welcome to AR OperatingSystem</h1>
    <p>Get started with a clean, modern interface designed to help you stay focused and productive.</p>
    <button type="button" onclick="showMessage()">Start Now</button>
    <div class="footer" id="welcome-message"></div>
  </main>

  <script>
    function showMessage() {
      const message = document.getElementById('welcome-message');
      message.textContent = 'Thanks for joining. Your workspace is ready.';
    }
  </script>
</body>
</html>
